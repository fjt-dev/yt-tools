<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Miniplayer Button</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <span class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -10 110 110" fill="none">
        <rect x="5" y="5" width="100" height="80" rx="6" stroke="currentColor" stroke-width="10"/>
        <mask id="popup-mask" fill="currentColor"><rect x="50" y="40" width="45" height="35" rx="5"/></mask>
        <rect x="50" y="40" width="45" height="35" rx="5" stroke="currentColor" stroke-width="20" mask="url(#popup-mask)"/>
      </svg>
    </span>
    <div>
      <div class="header-title">yt-tools</div>
      <div class="header-subtitle">youtube.com</div>
    </div>
  </div>

  <div class="status-card active" id="statusCard">
    <div class="card-title">Miniplayer Button</div>
    <div class="status-row">
      <div class="status-label">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Enabled</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="status-description">
      Miniplayer button is <span id="statusSpan">enabled</span> on YouTube.
    </div>
  </div>

  <div class="status-card" id="shortsCard">
    <div class="card-title">Shorts Blocker</div>
    <div class="status-row">
      <div class="status-label">
        <div class="status-dot off" id="shortsDot"></div>
        <span class="status-text" id="shortsText">Disabled</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shortsToggle" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="status-description">
      Shorts Blocker is <span id="shortsSpan" class="off">disabled</span> on YouTube.
    </div>
  </div>

  <hr class="divider" />

  <div class="footer">
    <a class="github-link" href="https://github.com/fjt-dev/yt-miniplayer" target="_blank">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
          .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      View on GitHub
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
